<html>
    <head>
        <meta charset="UTF-8">
        <title>Software Render</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.js"></script>
    </head>
    <body>

        <canvas id="Canvas"></canvas>

        <div>
            <label for="slider">Rotation Yaxis</label>
            <input type="range" id="slider" min="0" max="360" value="0">

            <input type="file" id="fileInput">
        </div>

        <script>

            //todo
            //rendering order,material,faces,cut,light

            class GameObject
            {
                position=[0,0,0];
                rotation=[0,0,0];
                scale=[1,1,1];

                constructor(vertex,faces)
                {
                    this.vertex=vertex;
                    this.faces=faces;
                }
            }

            class RenderPipeline
            {
                vertex=null;

                P=null;
                transfromScreenMatrix=null;
                transfromScreenMatrix=null;
                //transfromMatrix=null;

                constructor()
                {
                    this.P=this.Projection();
                    this.transfromScreenMatrix=math.multiply(this.Scale(canvasWidth/2,canvasHeight/2,1),this.translation(1,1,1));
                    this.transformCameraMatrix=math.multiply(this.Projection(),this.RotationY(-angleY),this.translation(-cameraPos[0],-cameraPos[1],-cameraPos[2]));
                }

                // Function to draw a pixel
                drawPixel(x, y, color) {
                    ctx.fillStyle = color;       
                    ctx.fillRect(x, y, 1, 1);
                }

                drawLine(v1,v2,color)
                {
                    ctx.strokeStyle=color
                    
                    ctx.beginPath();
                    ctx.moveTo(v1[0], v1[1]);
                    ctx.lineTo(v2[0], v2[1]);
                    ctx.stroke();
                }

                translation(x,y,z)
                {
                    return math.matrix([[1,0,0,x],
                                        [0,1,0,y],
                                        [0,0,1,z],
                                        [0,0,0,1]]);
                }

                RotationY(angle)
                {
                    return math.matrix([[math.cos(angle),0,math.sin(angle),0],
                                        [0,1,0,0],
                                        [-math.sin(angle),0,math.cos(angle),0],
                                        [0,0,0,1]]);
                }

                Scale(x,y,z)
                {
                    return math.matrix([[x,0,0,0],
                                        [0,y,0,0],
                                        [0,0,z,0],
                                        [0,0,0,1]]);
                }

                Projection()
                {
                    return math.matrix([[1/math.tan(fovX/2),0,0,0],
                                        [0,1/math.tan(fovY/2),0,0],
                                        [0,0,-(far+near)/(far-near),-(2*far*near)/(far-near)],
                                        [0,0,-1,0]]);
                } 

                transform(object)
                {
                    var S=this.Scale(object.scale[0],object.scale[1],object.scale[2]);
                    var R=this.RotationY(lerp(0,2*math.PI,object.rotation[1]));
                    var T=this.translation(object.position[0],object.position[1],object.position[2]);

                    var transfromMatrix=math.multiply(T,R,S);

                    for(let i=0;i<this.vertex.length;i++)
                    {
                        this.vertex[i]=math.multiply(transfromMatrix,math.transpose(this.vertex[i]));
                    }
                }

                transformCamera()
                {
                    for(let i=0;i<this.vertex.length;i++)
                    {
                        this.vertex[i]=math.multiply(this.transformCameraMatrix,this.vertex[i]);

                        this.vertex[i]=math.divide(this.vertex[i],this.vertex[i]._data[3]);                    
                    }
                }

                transformScreen()
                {
                    for(let i=0;i<this.vertex.length;i++)
                    {
                        this.vertex[i]=math.multiply(this.transfromScreenMatrix,this.vertex[i]);
                    }

                }

                draw()
                {
                    ctx.clearRect(0,0,canvasWidth,canvasHeight);

                    for(let i=0;i<objectList.length;i++)
                    {
                        this.vertex=objectList[i].vertex.slice();

                        this.transform(objectList[i]);
                        this.transformCamera();
                        this.transformScreen();

                        for(let j=0;j<this.vertex.length;j++)
                        {
                            this.vertex[j]=[this.vertex[j]._data[0],canvasHeight-this.vertex[j]._data[1]];
                        }

                        for(let j=0;j<objectList[i].faces.length;j++)
                        {
                            var face=objectList[i].faces[j];

                            this.drawLine(this.vertex[face[0]],this.vertex[face[1]],"black");
                            this.drawLine(this.vertex[face[0]],this.vertex[face[2]],"black");
                            this.drawLine(this.vertex[face[1]],this.vertex[face[2]],"black");   
                        }
                        
                    }
                }


            }

         

            function lerp(a,b,alpha) 
            {
                return a+alpha*(b-a);
            }

            const canvas = document.getElementById('Canvas');
            const ctx = canvas.getContext('2d');

            var canvasWidth=800;
            var canvasHeight=600;
            var sqr2=math.sqrt(2);

            //camera settings
            var angleY=math.PI;
            var angleX=0;
            var angleZ=0;

            //view frustum parameters
            var cameraPos=[20,20,-50];
            var far=80;
            var near=10;
            var fovX=math.PI/2;
            var fovY=math.PI/2;

            var objectList=[];
            var pipeline=new RenderPipeline();

            canvas.setAttribute("width",canvasWidth);
            canvas.setAttribute("height",canvasHeight);

            slider = document.getElementById('slider');
            slider.addEventListener('input', function() {
                objectList[0].rotation[1] = slider.value/360;
                pipeline.draw();
                console.log("call input function");
            });
            
            document.getElementById('fileInput').addEventListener('change', function(event) {

            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                
                reader.onload = function(e) 
                {
                    //console.log(e.target.result); // 文件内容

                    var result=e.target.result;
                    var lines=result.split("\n");

                    var vertex=[];
                    var faces=[];

                    for(let i=0;i<lines.length;i++)
                    {
                        var data=lines[i].split(" ");
                        
                        if(data[0]=='v')
                            vertex.push([Number(data[1]),Number(data[2]),Number(data[3]),1]);
                        else if(data[0]=='f')
                            faces.push([Number(data[1])-1,Number(data[2])-1,Number(data[3])-1]);
                    }

                    var teapot=new GameObject(vertex,faces);
                    teapot.scale=[10,10,10];
                    teapot.position=[30,0,10];

                    objectList.push(teapot);

                    pipeline.draw();
                };

                reader.readAsText(file);

            }
            });

        </script>

    </body>
</html>
