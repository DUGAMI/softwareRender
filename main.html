<html>
    <head>
        <meta charset="UTF-8">
        <title>Software Render</title>
        <script type="module" src="main.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/nicolaspanel/numjs@0.15.1/dist/numjs.min.js"></script>

        <style>
            .main-window
            {

            }

            .game-window
            {
                display: inline-block;

                border-radius: 5px;
                border-color: #ccc;
                border-style: solid;
                border-width: 2px;
            }

            .sidebar
            {
                display: inline-block;
                vertical-align: top;

                width: 250px;
                height: 600px;

                border-radius: 5px;
                border-color: #ccc;
                border-style: solid;
                border-width: 2px;
            }

            .transfrom-bar
            {
                display: flex;
                justify-content: space-between;
                margin-left: 10px;
                margin-right: 10px;
            }

            .input
            {
                width: 30px;
            }

        </style>

    </head>
    <body>

        <div class="main-window">
            <div class="game-window">
                <canvas id="Canvas"></canvas>
            </div>
            <div class="sidebar">

                <div style="margin-bottom: 10px;">

                    <span>Transfrom</span>

                    <div class="transfrom-bar">

                        <span>Position</span>

                        <div style="display:inline-block;">
                            <span>X</span><input class="input" id="PositionX">
                            <span>Y</span><input class="input" id="PositionY">
                            <span>Z</span><input class="input" id="PositionZ">
                        </div>
                    </div>

                    <div class="transfrom-bar">

                        <span>Rotation</span>

                        <div style="display:inline-block;">
                            <span>X</span><input class="input" id="RotationX">
                            <span>Y</span><input class="input" id="RotationY">
                            <span>Z</span><input class="input" id="RotationZ">
                        </div>
                    </div>

                    <div class="transfrom-bar">

                        <span>Scale</span>

                        <div style="display:inline-block;">
                            <span>X</span><input class="input" id="ScaleX">
                            <span>Y</span><input class="input" id="ScaleY">
                            <span>Z</span><input class="input" id="ScaleZ">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="slider" id="sliderTitle">slide bar</label>
                    <input type="range" id="slider" min="0" max="360" value="0">
                </div>

            </div>
        </div>

        <div>
            <input type="file" id="fileInput">
            <input type="file" id="material">
        </div>

    </body>
</html>
