<html>
    <head>
        <meta charset="UTF-8">
        <title>Software Render</title>
        <script type="module" src="main.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/nicolaspanel/numjs@0.15.1/dist/numjs.min.js"></script>

        <style>
            .main-window
            {

            }

            .game-window
            {
                display: inline-block;

                border-radius: 5px;
                border-color: #ccc;
                border-style: solid;
                border-width: 2px;
            }

            .sidebar
            {
                display: inline-block;
                vertical-align: top;

                width: 250px;
                height: 600px;

                border-radius: 5px;
                border-color: #ccc;
                border-style: solid;
                border-width: 2px;
            }

            .option-block
            {
                margin-top:10px;
                margin-bottom:10px;
            }

            .transfrom-bar
            {
                display: flex;
                justify-content: space-between;
                margin-left: 10px;
                margin-right: 10px;
            }

            .transform-panel
            {
                display: inline-block
            }

            .input
            {
                width: 30px;
            }

            .custom-list 
            {
                list-style: none; /* 去掉前面的圆点 */
                padding: 0;
            }

            .custom-list li
            {
                padding: 0px 15px;
                transition: all 0.3s ease; /* 添加过渡动画 */
                cursor: pointer;
                border-radius: 8px; /* 初始圆角（可调） */
            }

            .custom-list li:hover 
            {
                background-color: lightgrey; /* 背景纯白 */
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* 轻微阴影，突出高亮 */
                border-radius: 12px; /* 鼠标悬停时更圆一些 */
            }

            .selected
            {
                background-color: lightgrey; /* 背景纯白 */
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* 轻微阴影，突出高亮 */
                border-radius: 12px; /* 鼠标悬停时更圆一些 */
            }


        </style>

    </head>
    <body>

        <div class="main-window">
            <div class="sidebar">
                <div class="option-block">
                    <span>Object List</span>
                    <ul id="objectList" class="custom-list">
                        <!-- Object list will be populated here -->
                    </ul>
                </div>
            </div>
            <div class="game-window">
                <canvas id="Canvas"></canvas>
            </div>
            <div class="sidebar">

                <div style="margin-bottom: 10px;">

                    <div class="option-block">
                        <span>Render Option</span>

                        <div class="transfrom-bar">

                            <div class="transform-panel">

                                    <div>
                                        <input type="checkbox" id="DepthMap" name="DepthMap"/>
                                        <label for="DepthMap">Depth Map</label>
                                    </div>
                                
                                    <div>
                                        <form id="shaddingFrequency">
                                            <div>
                                                <label><input type="radio" name="option" value="FlatShading" checked>Flat Shading</label>
                                            </div>

                                            <div>
                                                <label><input type="radio" name="option" value="GouraudShading">Gouraud Shading</label>
                                            </div>

                                            <div>
                                                <label><input type="radio" name="option" value="PhongShading">Phong Shading</label>
                                            </div>
                                        </form>
                                    </div>
                            </div>
                        </div>
                    </div>


                    <div class="option-block">
                        <span>Transfrom</span>

                        <div class="transfrom-bar">

                            <span>Position</span>

                            <div class="transform-panel">
                                <div class="transform-panel" id="PositionX"><span>X</span><input class="input"></div>
                                <div class="transform-panel" id="PositionY"><span>Y</span><input class="input"></div>
                                <div class="transform-panel" id="PositionZ"><span>Z</span><input class="input"></div>
                            </div>
                        </div>

                        <div class="transfrom-bar">

                            <span>Rotation</span>

                            <div class="transform-panel">
                                <div class="transform-panel" id="RotationX"><span>X</span><input class="input"></div>
                                <div class="transform-panel" id="RotationY"><span>Y</span><input class="input"></div>
                                <div class="transform-panel" id="RotationZ"><span>Z</span><input class="input"></div>
                            </div>
                        </div>

                        <div class="transfrom-bar">

                            <span>Scale</span>

                            <div class="transform-panel">
                                <div class="transform-panel" id="ScaleX"><span>X</span><input class="input"></div>
                                <div class="transform-panel" id="ScaleY"><span>Y</span><input class="input"></div>
                                <div class="transform-panel" id="ScaleZ"><span>Z</span><input class="input"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 10px;">
                    <label for="slider" id="sliderTitle">slide bar</label>
                    <input type="range" id="slider" min="0" max="360" value="0">
                </div>

            </div>
        </div>

        <div>
            <input type="file" id="fileInput">
            <input type="file" id="material">
        </div>

    </body>
</html>
